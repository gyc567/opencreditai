<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="2048" height="2048" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1f25" />
      <stop offset="70%" stop-color="#111111" />
      <stop offset="100%" stop-color="#111111" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(0, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>

    <!-- Glow 1 Gradient (Center) -->
    <radialGradient id="glow1Gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(0, 255, 242, 0.15)" />
      <stop offset="70%" stop-color="rgba(0, 0, 0, 0)" />
    </radialGradient>

    <!-- Glow 2 Gradient (Top Left) -->
    <radialGradient id="glow2Gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="rgba(0, 150, 255, 0.1)" />
      <stop offset="60%" stop-color="rgba(0, 0, 0, 0)" />
    </radialGradient>
    
    <!-- Drop Shadow Filter for Image -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="25" />
      <feOffset dx="0" dy="0" result="offsetblur" />
      <feFlood flood-color="rgba(0, 255, 242, 0.3)" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2048" height="2048" fill="url(#bgGradient)" />

  <!-- Tech Grid -->
  <rect width="2048" height="2048" fill="url(#gridPattern)" />

  <!-- Glow Circles -->
  <!-- Glow 1: 1200x1200 centered -->
  <circle cx="1024" cy="1024" r="600" fill="url(#glow1Gradient)" />
  
  <!-- Glow 2: 600x600 at top 30%, left 20% -> x=410, y=614 -->
  <circle cx="410" cy="614" r="300" fill="url(#glow2Gradient)" />

  <!-- Circuit Lines (from HTML) -->
  <g class="circuit-lines">
      <path d="M100 100 L300 100 L350 150" stroke="rgba(0, 255, 242, 0.3)" stroke-width="2" fill="none" />
      <circle cx="100" cy="100" r="4" fill="rgba(0, 255, 242, 0.5)" />
      
      <path d="M1948 1948 L1748 1948 L1698 1898" stroke="rgba(0, 255, 242, 0.3)" stroke-width="2" fill="none" />
      <circle cx="1948" cy="1948" r="4" fill="rgba(0, 255, 242, 0.5)" />

      <path d="M1948 100 L1800 100 L1750 150 L1750 300" stroke="rgba(0, 255, 242, 0.2)" stroke-width="2" fill="none" />
      <path d="M100 1948 L250 1948 L300 1898 L300 1750" stroke="rgba(0, 255, 242, 0.2)" stroke-width="2" fill="none" />
  </g>

  <!-- HUD Circles -->
  <!-- HUD C1: 1400x1400 centered, dashed, rotating -->
  <g transform="translate(1024, 1024)">
    <circle cx="0" cy="0" r="700" fill="none" stroke="rgba(0, 255, 242, 0.2)" stroke-width="2" stroke-dasharray="10, 10">
       <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="60s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- HUD C2: 1300x1300 centered, solid -->
  <circle cx="1024" cy="1024" r="650" fill="none" stroke="rgba(0, 255, 242, 0.1)" stroke-width="1" />

  <!-- Main Character Image -->
  <!-- 1600x1600 centered container (x=224, y=224) -->
  <g>
    <image x="224" y="224" width="1600" height="1600" href="https://a.lovart.ai/artifacts/agent/jEyT9542ZHKxEvnT.jpeg" filter="url(#dropShadow)" preserveAspectRatio="xMidYMid meet">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="6s" repeatCount="indefinite" />
    </image>
  </g>

</svg>
